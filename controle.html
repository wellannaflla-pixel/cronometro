<!DOCTYPE html>
<html>
<body>
    <button onclick="enviar('iniciar')">INICIAR</button>
    <button onclick="enviar('acrescentar3')">+3 MIN</button>
    <button onclick="enviar('resetar')">RESETAR</button>

    <script src="/socket.io/socket.io.js"></script>
    <script>
        const socket = io();
        function enviar(cmd) {
            socket.emit('comando', cmd);
        }
    </script>
</body>
</html>
