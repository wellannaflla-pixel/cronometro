<!DOCTYPE html>
<html lang="pt-br">
<head>
    <meta charset="UTF-8">
    <title>Placar Futsal</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { 
            background: black; 
            color: white; 
            display: flex; 
            justify-content: center; 
            align-items: center; 
            height: 100vh; 
            margin: 0; 
            overflow: hidden; 
            transition: background-color 0.2s; 
        }

        /* Animação de piscar */
        @keyframes piscar {
            0% { background-color: red; }
            50% { background-color: black; }
            100% { background-color: red; }
        }

        .piscar-vermelho {
            animation: piscar 0.5s infinite;
        }

        #display { 
            font-size: 40vw; 
            font-family: 'Courier New', monospace; 
            font-weight: bold;
            line-height: 1;
        }
    </style>
</head>
<body>
    <div id="display">00:05</div>
    <audio id="somSirene" src="sirene.mp3"></audio>

    <script>
        document.addEventListener('DOMContentLoaded', () => {
            const socket = io();
            const sirene = document.getElementById('somSirene');
            const display = document.getElementById('display');
            let tempo = 5;
            let rodando = false;
            let timer;
            let somAutorizado = false;

            function autorizarAudio() {
                if (!somAutorizado && sirene) {
                    sirene.play().then(() => {
                        sirene.pause();
                        sirene.currentTime = 0;
                        somAutorizado = true;
                        document.body.removeEventListener('click', autorizarAudio);

                        if (!document.fullscreenElement) {
                            document.documentElement.requestFullscreen().catch(err => console.log(err));
                        }
                    }).catch(e => console.log("Aguardando interação:", e));
                }
            }
            document.body.addEventListener('click', autorizarAudio);

            function atualizarDisplay() {
                let m = Math.floor(tempo / 60);
                let s = tempo % 60;
                display.innerText = `${m}:${s < 10 ? '0'+s : s}`;
            }

            socket.on('comando', (cmd) => {
                if (cmd === 'iniciar' && !rodando) {
                    rodando = true;
                    timer = setInterval(() => {
                        if (tempo > 0) {
                            tempo--;
                            atualizarDisplay();
                        } else {
                            clearInterval(timer);
                            rodando = false;
                            
                            // Toca o som
                            if (sirene) sirene.play();
                            
                            // Ativa a classe que faz piscar
                            document.body.classList.add('piscar-vermelho');
                            
                            // Para de piscar após 5 segundos
                            setTimeout(() => { 
                                document.body.classList.remove('piscar-vermelho');
                                document.body.style.backgroundColor = "black";
                            }, 5000);
                        }
                    }, 1000);
                }
                
                if (cmd === 'resetar' || cmd === 'acrescentar3') {
                    if (sirene) { sirene.pause(); sirene.currentTime = 0; }
                    document.body.classList.remove('piscar-vermelho'); // Para de piscar se resetar
                    if (cmd === 'resetar') { tempo = 5; clearInterval(timer); rodando = false; }
                    if (cmd === 'acrescentar3') { tempo += 180; }
                    atualizarDisplay();
                    document.body.style.backgroundColor = "black";
                }
            });
        });
    </script>
</body>
</html>
