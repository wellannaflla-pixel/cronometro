<!DOCTYPE html>
<html>
<head>
    <title>Placar Futsal</title>
    <script src="/socket.io/socket.io.js"></script>
    <style>
        body { background: black; color: white; display: flex; justify-content: center; align-items: center; height: 100vh; font-size: 30vh; font-family: sans-serif; }
    </style>
</head>
<body>
    <div id="display">00:05</div>
    <script>
        // 1. COLOQUE O CÓDIGO DE AUTORIZAÇÃO AQUI EM CIMA
    const sirene = document.getElementById('somSirene');
    let somAutorizado = false;

    function autorizarAudio() {
        if (!somAutorizado) {
            sirene.play().then(() => {
                sirene.pause();
                sirene.currentTime = 0;
                somAutorizado = true;
                console.log("Áudio autorizado com sucesso!");
                document.body.removeEventListener('click', autorizarAudio);
            }).catch(e => console.log("Ainda bloqueado:", e));
        }
    }
    document.body.addEventListener('click', autorizarAudio);
    const socket = io();
    let tempo = 5; // 10 minutos
    let acrescimoUsado = false;
    let rodando = false;
    let timer;

    const display = document.getElementById('display');

    function atualizarDisplay() {
        let m = Math.floor(tempo / 60);
        let s = tempo % 60;
        display.innerText = `${m}:${s < 10 ? '0'+s : s}`;
    }

    socket.on('comando', (cmd) => {
        if (cmd === 'iniciar' && !rodando) {
            rodando = true;
            timer = setInterval(() => {
                if (tempo > 0) {
                    tempo--;
                    atualizarDisplay();
                
if (tempo > 0) {
    tempo--;
    atualizarDisplay();
} else {
    clearInterval(timer);
    rodando = false;
    
    // Tocar a sirene
    document.getElementById('somSirene').play();
    
    // Efeito visual de alerta
    document.body.style.backgroundColor = "red";
    setTimeout(() => { document.body.style.backgroundColor = "black"; }, 3000);
    
}
                }
            }, 1000);
        }
        
        if (cmd === 'acrescentar3' && !acrescimoUsado) {
            tempo += 180; // Adiciona 3 minutos
            acrescimoUsado = true; // Bloqueia para não usar de novo
            atualizarDisplay();
        }

        if (cmd === 'resetar') {
            tempo = 600;
            acrescimoUsado = false;
            atualizarDisplay();
            clearInterval(timer);
            rodando = false;
        }
    });
</script>
</body>
<audio id="somSirene" src="sirene.mp3"></audio>
</html>
