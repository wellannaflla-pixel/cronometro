<script>
    const socket = io();
    let tempo = 3; 
    let acrescimoUsado = false;
    let rodando = false;
    let timer;

    const display = document.getElementById('display');
    const sirene = document.getElementById('somSirene');

    function atualizarDisplay() {
        let m = Math.floor(tempo / 60);
        let s = tempo % 60;
        display.innerText = `${m}:${s < 10 ? '0'+s : s}`;
    }

    socket.on('comando', (cmd) => {
        if (cmd === 'iniciar' && !rodando) {
            rodando = true;
            timer = setInterval(() => {
                if (tempo > 0) {
                    tempo--;
                    atualizarDisplay();
                } else {
                    clearInterval(timer);
                    rodando = false;
                    
                    // Tenta tocar o som
                    sirene.play().catch(e => console.log("Navegador bloqueou o som: interaja com a página antes!"));
                    
                    document.body.style.backgroundColor = "red";
                    setTimeout(() => { document.body.style.backgroundColor = "black"; }, 3000);
                    alert("FIM DE JOGO!");
                }
            }, 1000);
        }
        
        if (cmd === 'acrescentar3' && !acrescimoUsado) {
            tempo += 180;
            acrescimoUsado = true;
            atualizarDisplay();
        }

        if (cmd === 'resetar') {
            tempo = 600;
            acrescimoUsado = false;
            atualizarDisplay();
            clearInterval(timer);
            rodando = false;
            document.body.style.backgroundColor = "black";
        }
    });
</script>
